{% extends 'base.html' %}
{% load static %}

{% block title %}
  Signed Out — The Quiet Loud
{% endblock %}

{% block extra_css %}
  <link rel="stylesheet" href="{% static 'assets/css/auth.css' %}" />
{% endblock %}

{% block content %}
  <main>
    <div class="auth-card" style="text-align: center;">
      <h1 class="auth-title">Are you sure you want to <em>sign out?</em></h1>
      <p class="auth-sub">Your words are safe. Come back whenever you're ready.</p>
      <div class="auth-footer">
        <form method="post" action="{% url 'account_logout' %}">
          {% csrf_token %}
          <button class="btn-primary" type="submit">Sign Out</button>
        </form>
      </div>
    </div>
  </main>
{% endblock %}
